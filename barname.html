<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>هوشنگ، برنامه ریزی برای امتحان نهایی</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;700&display=swap');
        
        body {
            font-family: 'IRANSansX', 'Vazirmatn', Tahoma, sans-serif;
            background-color: #f8fafc;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f5f9;
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>
<body class="text-slate-800 min-h-screen bg-gradient-to-br from-indigo-50/40 via-slate-50 to-emerald-50/30 pb-12">

    <div class="max-w-6xl mx-auto px-4 pt-8">
        
        <header class="flex flex-col md:flex-row md:items-center md:justify-between gap-4 mb-8 glass-card p-6 rounded-3xl shadow-xl shadow-slate-100">
            <div>
                <h1 class="text-2xl font-bold bg-gradient-to-r from-slate-800 to-indigo-900 bg-clip-text text-transparent">هوشنگ، برنامه ریزی برای امتحان نهایی، نسخه 2</h1>
                <p id="today-greeting" class="text-slate-500 text-sm mt-1">لعن عمر فراموش نشه!</p>
            </div>
            <div class="flex items-center gap-3 bg-white shadow-sm border border-slate-100 px-5 py-3 rounded-2xl self-start md:self-auto">
                <span class="w-2.5 h-2.5 rounded-full bg-emerald-500 animate-pulse"></span>
                <span id="current-date-display" class="font-bold text-slate-700 text-sm">امروز: —</span>
            </div>
        </header>

        <section class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            <div class="glass-card p-6 rounded-3xl shadow-lg shadow-slate-100 border border-slate-100">
                <div class="flex justify-between items-center mb-3">
                    <span class="text-sm font-bold text-slate-600 flex items-center gap-2">
                        <svg class="w-5 h-5 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path></svg>
                        میزان پیشرفت برنامه‌ی امروز
                    </span>
                    <span id="today-progress-percent" class="text-lg font-black text-indigo-600">0%</span>
                </div>
                <div class="w-full bg-slate-100 h-3 rounded-full overflow-hidden p-[2px]">
                    <div id="today-progress-bar" class="bg-gradient-to-r from-indigo-500 to-purple-500 h-full rounded-full transition-all duration-500 ease-out" style="width: 0%"></div>
                </div>
            </div>

            <div class="glass-card p-6 rounded-3xl shadow-lg shadow-slate-100 border border-slate-100">
                <div class="flex justify-between items-center mb-3">
                    <span class="text-sm font-bold text-slate-600 flex items-center gap-2">
                        <svg class="w-5 h-5 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                        پیشرفت کل دوره
                    </span>
                    <span id="total-progress-percent" class="text-lg font-black text-emerald-600">0%</span>
                </div>
                <div class="w-full bg-slate-100 h-3 rounded-full overflow-hidden p-[2px]">
                    <div id="total-progress-bar" class="bg-gradient-to-r from-emerald-500 to-teal-500 h-full rounded-full transition-all duration-500 ease-out" style="width: 0%"></div>
                </div>
            </div>
        </section>

        <main class="grid grid-cols-1 lg:grid-cols-3 gap-8 items-start">
            
            <div class="lg:col-span-2 order-1 lg:order-1 space-y-6">
                <div class="glass-card p-6 md:p-8 rounded-3xl shadow-xl border border-slate-50 min-h-[500px]">
                    <div class="flex flex-col sm:flex-row sm:items-center justify-between border-b border-slate-100 pb-5 mb-6 gap-4">
                        <div>
                            <span id="selected-day-label" class="text-xs font-bold text-indigo-600 bg-indigo-50 px-3 py-1 rounded-full">روز جاری</span>
                            <h2 id="selected-day-title" class="text-2xl font-black text-slate-800 mt-2">بارگذاری...</h2>
                        </div>
                        <div class="text-sm text-slate-400 bg-slate-50 px-4 py-2 rounded-xl self-start sm:self-auto">
                            مجموع زمان ثبت شده: <span id="day-total-minutes" class="font-bold text-slate-700">0</span> دقیقه
                        </div>
                    </div>

                    <div id="tasks-list-container" class="space-y-4">
                        </div>
                </div>
            </div>

            <div class="lg:col-span-1 order-2 lg:order-2 glass-card p-5 rounded-3xl shadow-xl max-h-[680px] flex flex-col">
                <h3 class="text-sm font-bold text-slate-400 uppercase tracking-wider mb-4 px-2">تقویم روزهای دوره</h3>
                <div id="days-menu-container" class="space-y-2 overflow-y-auto custom-scrollbar pr-1 flex-1">
                    </div>
            </div>

        </main>
    </div>

    <script>
        // Updated Schedule JSON Data
        const scheduleData = [
            { id: 1, dateStr: "۲۱ خرداد", label: "پنجشنبه", tasks: ["فارسی، ستایش", "جامعه‌شناسی، درس ۱", "دینی، درس ۱", "عربی، درس ۱، قواعد"] },
            { id: 2, dateStr: "۲۲ خرداد", label: "جمعه", tasks: ["فارسی، درس ۱", "تاریخ، درس ۱", "زبان، درس ۱، پارت ۱ از ۴", "جامعه‌شناسی، درس ۲"] },
            { id: 3, dateStr: "۲۳ خرداد", label: "شنبه", tasks: ["فارسی، درس ۲", "دینی، درس ۲", "عربی، درس ۱، ترجمه", "تاریخ، درس ۲", "جامعه‌شناسی، درس ۳"] },
            { id: 4, dateStr: "۲۴ خرداد", label: "یکشنبه", tasks: ["فارسی، درس ۳", "زبان، درس ۱، پارت ۲ از ۴", "دینی، درس ۳", "تاریخ، درس ۳"] },
            { id: 5, dateStr: "۲۵ خرداد", label: "دوشنبه", tasks: ["فارسی، درس ۵", "جامعه‌شناسی، درس ۴", "عربی، درس ۲، قواعد", "دینی، درس ۴", "تاریخ، درس ۴"] },
            { id: 6, dateStr: "۲۶ خرداد", label: "سه‌شنبه", tasks: ["فارسی، درس ۶", "زبان، درس ۱، پارت ۳ از ۴", "جامعه‌شناسی، درس ۵", "تاریخ، درس ۵"] },
            { id: 7, dateStr: "۲۷ خرداد", label: "چهارشنبه", tasks: ["فارسی، درس ۷", "دینی، درس ۵", "عربی، درس ۲، ترجمه", "جامعه‌شناسی، درس ۶", "تاریخ، درس ۶"] },
            { id: 8, dateStr: "۲۸ خرداد", label: "پنجشنبه", tasks: ["فارسی، درس ۸", "زبان، درس ۱، پارت ۴ از ۴", "دینی، درس ۶", "تاریخ، درس ۷"] },
            { id: 9, dateStr: "۲۹ خرداد", label: "جمعه", tasks: ["فارسی، درس ۹", "جامعه‌شناسی، درس ۷", "عربی، درس ۳، قواعد", "دینی، درس ۷", "تاریخ، درس ۸"] },
            { id: 10, dateStr: "۳۰ خرداد", label: "شنبه", tasks: ["فارسی، درس ۱۰", "زبان، درس ۲، پارت ۱ از ۴", "جامعه‌شناسی، درس ۸", "دینی، درس ۸"] },
            { id: 11, dateStr: "۳۱ خرداد", label: "یکشنبه", tasks: ["فارسی، درس ۱۱", "تاریخ، درس ۹", "عربی، درس ۳، ترجمه", "جامعه‌شناسی، درس ۹", "دینی، درس ۹"] },
            { id: 12, dateStr: "۱ تیر", label: "دوشنبه", tasks: ["فارسی، درس ۱۲", "زبان، درس ۲، پارت ۲ از ۴", "تاریخ، درس ۱۰", "دینی، درس ۱۰"] },
            { id: 13, dateStr: "۲ تیر", label: "سه‌شنبه", tasks: ["فارسی، درس ۱۴", "جامعه‌شناسی، درس ۱۰", "عربی، درس ۴، قواعد", "تاریخ، درس ۱۱", "دینی، درس ۱۱"] },
            { id: 14, dateStr: "۳ تیر", label: "چهارشنبه", tasks: ["فارسی، درس ۱۵", "زبان، درس ۲، پارت ۳ از ۴", "جامعه‌شناسی، درس ۱۱", "تاریخ، درس ۱۲"] },
            { id: 15, dateStr: "۴ تیر", label: "پنجشنبه", tasks: ["فارسی، درس ۱۶", "عربی، درس ۴، ترجمه", "دینی، درس ۱۲", "جامعه‌شناسی، درس ۱۲", "تاریخ، درس ۱۳"] },
            { id: 16, dateStr: "۵ تیر", label: "جمعه", tasks: ["فارسی، درس ۱۷", "زبان، EXP: ۲، پارت ۴ از ۴", "دینی، درس ۱۳", "تاریخ، درس ۱۴"] },
            { id: 17, dateStr: "۶ تیر", label: "شنبه", tasks: ["فارسی، درس ۱۸", "جامعه‌شناسی، درس ۱۳", "عربی، درس ۵، قواعد", "دینی، درس ۱۴", "تاریخ، درس ۱۵"] },
            { id: 18, dateStr: "۷ تیر", label: "یکشنبه", tasks: ["فارسی، نیایش", "زبان، درس ۳، پارت ۱ از ۴", "جامعه‌شناسی، درس ۱۴", "دینی، درس ۱۵"] },
            { id: 19, dateStr: "۸ تیر", label: "دوشنبه", tasks: ["عربی، درس ۵، ترجمه", "تاریخ، درس ۱۶", "جامعه‌شناسی، درس ۱۵", "دینی، درس ۱۶", "زبان، درس ۳، پارت ۲ از ۴"] },
            { id: 20, dateStr: "۹ تیر", label: "سه‌شنبه", tasks: ["عربی، درس ۶، قواعد", "جامعه‌شناسی، درس ۱۶", "دینی، درس ۱۷", "زبان، درس ۳، پارت ۳ از ۴"] },
            { id: 21, dateStr: "۱۰ تیر", label: "چهارشنبه", tasks: ["عربی، درس ۶، ترجمه", "عربی، درس ۷، قواعد", "دینی، درس ۱۸", "زبان، درس ۳، پارت ۴ از ۴", "عربی، درس ۷، ترجمه"] }
        ];

        // State Core Object
        let userProgress = JSON.parse(localStorage.getItem('study_dashboard_progress_v2')) || {};
        let activeDayId = 1;

        // Persist Data helper
        function saveToStorage() {
            localStorage.setItem('study_dashboard_progress_v2', JSON.stringify(userProgress));
            updateOverallProgressBars();
        }

        // Standardize digits
        function p2eDigits(str) {
            return str.replace(/[٠-٩]/g, d => "٠١٢٣٤٥٦٧٨٩".indexOf(d)).replace(/[۰-۹]/g, d => "۰۱۲۳۴۵۶۷۸۹".indexOf(d));
        }

        // Realtime Local Jalali Date Matcher
        function initCurrentDateDetection() {
            try {
                const options = { month: 'long', day: 'numeric' };
                const formatter = new Intl.DateTimeFormat('fa-IR', options);
                const formattedToday = formatter.format(new Date());
                
                document.getElementById('current-date-display').innerText = `امروز: ${formattedToday}`;

                // Try to find matching day in schedule
                const todayClean = p2eDigits(formattedToday.trim().replace(/\s+/g, ' '));
                const matchedDay = scheduleData.find(item => {
                    const dataClean = p2eDigits(item.dateStr.trim().replace(/\s+/g, ' '));
                    return todayClean.includes(dataClean) || dataClean.includes(todayClean);
                });

                if (matchedDay) {
                    activeDayId = matchedDay.id;
                    document.getElementById('today-greeting').innerText = `برنامه امروز شما (${matchedDay.label} ${matchedDay.dateStr}) به طور خودکار فعال شد. با قدرت جلو برو!`;
                }
            } catch (e) {
                console.log("Jalali Date detection fallback triggered", e);
            }
        }

        // Render Sidebar Navigation
        function renderDaysMenu() {
            const container = document.getElementById('days-menu-container');
            container.innerHTML = '';

            scheduleData.forEach(day => {
                const isSelected = day.id === activeDayId;
                
                // Calculate completion details for specific day
                const dayTasks = day.tasks;
                let completedCount = 0;
                dayTasks.forEach((_, idx) => {
                    if (userProgress[`day_${day.id}_task_${idx}`]?.completed) completedCount++;
                });
                const isFullyDone = completedCount === dayTasks.length && dayTasks.length > 0;

                const btn = document.createElement('button');
                btn.type = 'button';
                btn.className = `w-full flex items-center justify-between p-3.5 rounded-2xl text-right transition-all duration-300 ${
                    isSelected 
                    ? 'bg-gradient-to-l from-indigo-600 to-indigo-500 text-white shadow-md shadow-indigo-200/50 scale-[1.01] font-bold' 
                    : isFullyDone 
                        ? 'bg-emerald-50 text-emerald-800 border border-emerald-100 font-medium hover:bg-emerald-100/70'
                        : 'bg-white text-slate-700 hover:bg-slate-50 border border-slate-100 hover:border-slate-200'
                }`;

                btn.onclick = () => {
                    activeDayId = day.id;
                    renderDaysMenu();
                    renderFocusedDay();
                    updateOverallProgressBars();
                };

                btn.innerHTML = `
                    <div class="flex flex-col">
                        <span class="${isSelected ? 'text-indigo-100' : 'text-slate-400'} text-xs font-semibold">${day.label}</span>
                        <span class="text-sm mt-0.5">${day.dateStr}</span>
                    </div>
                    <span class="text-xs px-2.5 py-1 rounded-full ${isSelected ? 'bg-white/20 text-white' : isFullyDone ? 'bg-emerald-500 text-white' : 'bg-slate-100 text-slate-500'}">
                        ${completedCount}/${dayTasks.length}
                    </span>
                `;
                container.appendChild(btn);
            });
        }

        // Render Focused Main Target Card
        function renderFocusedDay() {
            const currentDayObj = scheduleData.find(d => d.id === activeDayId);
            if (!currentDayObj) return;

            document.getElementById('selected-day-title').innerText = `${currentDayObj.label} - ${currentDayObj.dateStr}`;
            
            const listContainer = document.getElementById('tasks-list-container');
            listContainer.innerHTML = '';

            let dayTotalMin = 0;

            currentDayObj.tasks.forEach((taskName, idx) => {
                const taskKey = `day_${activeDayId}_task_${idx}`;
                const isCompleted = userProgress[taskKey]?.completed || false;
                const minutesSpent = userProgress[taskKey]?.minutes || '';

                if (isCompleted && minutesSpent) {
                    dayTotalMin += parseInt(minutesSpent) || 0;
                }

                const taskRow = document.createElement('div');
                taskRow.className = `flex flex-col sm:flex-row sm:items-center justify-between p-4 rounded-2xl border transition-all duration-300 gap-4 ${
                    isCompleted 
                    ? 'bg-gradient-to-l from-emerald-50/70 to-white border-emerald-200 shadow-sm' 
                    : 'bg-white border-slate-100 hover:border-slate-200 shadow-sm hover:shadow'
                }`;

                taskRow.innerHTML = `
                    <div class="flex items-center gap-4 flex-1">
                        <label class="relative flex items-center cursor-pointer">
                            <input type="checkbox" ${isCompleted ? 'checked' : ''} 
                                onchange="toggleTaskStatus(${idx}, this.checked)"
                                class="peer sr-only">
                            <div class="w-6 h-6 bg-white border-2 border-slate-200 rounded-lg transition-all peer-checked:bg-emerald-500 peer-checked:border-emerald-500 flex items-center justify-center shadow-sm">
                                <svg class="w-4 h-4 text-white opacity-0 peer-checked:opacity-100 transition-opacity" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path>
                                </svg>
                            </div>
                        </label>
                        <span class="text-sm font-semibold transition-colors duration-200 ${isCompleted ? 'text-emerald-900 line-through opacity-75' : 'text-slate-700'}">
                            ${taskName}
                        </span>
                    </div>
                    
                    <div class="flex items-center gap-2 self-end sm:self-auto">
                        <span class="text-xs text-slate-400">زمان مطالعه:</span>
                        <input type="number" min="0" placeholder="0" 
                            value="${minutesSpent}"
                            oninput="updateTaskMinutes(${idx}, this.value)"
                            class="w-20 px-3 py-1.5 text-center bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all text-slate-700 placeholder-slate-300">
                        <span class="text-xs text-slate-400">دقیقه</span>
                    </div>
                `;
                listContainer.appendChild(taskRow);
            });

            document.getElementById('day-total-minutes').innerText = dayTotalMin;
        }

        // Action Trigger: Toggle Checkbox
        window.toggleTaskStatus = function(idx, checked) {
            const taskKey = `day_${activeDayId}_task_${idx}`;
            if (!userProgress[taskKey]) userProgress[taskKey] = { completed: false, minutes: 0 };
            
            userProgress[taskKey].completed = checked;
            saveToStorage();
            renderFocusedDay();
            renderDaysMenu();
        };

        // Action Trigger: Change Minutes
        window.updateTaskMinutes = function(idx, value) {
            const taskKey = `day_${activeDayId}_task_${idx}`;
            if (!userProgress[taskKey]) userProgress[taskKey] = { completed: false, minutes: 0 };
            
            userProgress[taskKey].minutes = value ? parseInt(value) : 0;
            saveToStorage();
            
            // Recalculate and show total minutes live
            let dayTotalMin = 0;
            const currentDayObj = scheduleData.find(d => d.id === activeDayId);
            currentDayObj.tasks.forEach((_, tIdx) => {
                const tk = `day_${activeDayId}_task_${tIdx}`;
                if (userProgress[tk]?.completed && userProgress[tk]?.minutes) {
                    dayTotalMin += parseInt(userProgress[tk].minutes) || 0;
                }
            });
            document.getElementById('day-total-minutes').innerText = dayTotalMin;
        };

        // Live Percentage Calculator Dashboard
        function updateOverallProgressBars() {
            let totalTasksCount = 0;
            let totalCompletedCount = 0;

            let activeDayTasksCount = 0;
            let activeDayCompletedCount = 0;

            scheduleData.forEach(day => {
                day.tasks.forEach((_, idx) => {
                    totalTasksCount++;
                    const isDone = userProgress[`day_${day.id}_task_${idx}`]?.completed || false;
                    if (isDone) totalCompletedCount++;

                    if (day.id === activeDayId) {
                        activeDayTasksCount++;
                        if (isDone) activeDayCompletedCount++;
                    }
                });
            });

            // Calc Today Progress
            const todayPercent = activeDayTasksCount > 0 ? Math.round((activeDayCompletedCount / activeDayTasksCount) * 100) : 0;
            document.getElementById('today-progress-percent').innerText = `${todayPercent}%`;
            document.getElementById('today-progress-bar').style.width = `${todayPercent}%`;

            // Calc Total Progress
            const totalPercent = totalTasksCount > 0 ? Math.round((totalCompletedCount / totalTasksCount) * 100) : 0;
            document.getElementById('total-progress-percent').innerText = `${totalPercent}%`;
            document.getElementById('total-progress-bar').style.width = `${totalPercent}%`;
        }

        // Entry Point Initializer
        window.addEventListener('DOMContentLoaded', () => {
            initCurrentDateDetection();
            renderDaysMenu();
            renderFocusedDay();
            updateOverallProgressBars();
        });
    </script>
</body>
</html>
